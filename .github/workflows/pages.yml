name: pages

# Public-repo workflow. Mirrored in from hologramism-rs (public/.github/).
# Builds the browser example and deploys it to GitHub Pages. Runs after each
# mirror push to main, or manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install browser binding deps
        working-directory: bindings/browser
        run: npm install
      - name: Install example deps
        working-directory: examples/browser
        # Resolves @hologramism/browser via the in-repo file: path (ships pkg/).
        run: npm install
      - name: Build
        working-directory: examples/browser
        env:
          GITHUB_PAGES: '1' # vite base = /hologramism/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/browser/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
