buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// The native engine AAR (io.github.alexdonh:hologramism) lives on Maven Central;
// for local dev it's published to mavenLocal by
// `cd bindings/android && ./gradlew :hologramism:publishToMavenLocal`.
allprojects {
    repositories {
        mavenLocal()
        mavenCentral()
    }
}
