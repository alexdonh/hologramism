buildscript {
    ext.kotlin_version = "1.9.24"
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.5.2"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "io.github.alexdonh.hologramism.reactnative"
    compileSdk = 34

    defaultConfig {
        minSdk = 24 // hologramism native floor (wgpu Vulkan/GL).
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
}

repositories {
    google()
    // Published native engine AAR (io.github.alexdonh:hologramism on Maven
    // Central — anonymous, no credentials needed).
    mavenCentral()
    // Local dev: build the AAR with scripts/build_android.sh then
    // `./gradlew :hologramism:publishToMavenLocal`.
    mavenLocal()
}

dependencies {
    implementation "com.facebook.react:react-android"
    // The shared native HologramView (TextureView + engine).
    implementation "io.github.alexdonh:hologramism:1.0.0"
}
